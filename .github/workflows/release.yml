name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - v*

env:
  PACKAGE_DIRS: "ddns-go luci-app-ddns-go"
  
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  scan-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.scan.outputs.packages }}
      package-list: ${{ steps.scan.outputs.package-list }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Scan package directories
        id: scan
        run: |
          PACKAGES_JSON="[]"
          PACKAGE_LIST=""
          
          for dir in ${{ env.PACKAGE_DIRS }}; do
            if [ -d "$dir" ] && [ -f "$dir/Makefile" ]; then
              PKG_NAME=$(grep "^PKG_NAME" "$dir/Makefile" | head -1 | cut -d'=' -f2 | tr -d '[:space:]' || echo "")
              PKG_VERSION=$(grep "^PKG_VERSION" "$dir/Makefile" | head -1 | cut -d'=' -f2 | tr -d '[:space:]' || echo "")
              PKG_TITLE=$(grep "TITLE:=" "$dir/Makefile" | head -1 | cut -d':=' -f2 | sed 's/^[ \t]*//;s/[ \t]*$//' || echo "")
              
              if [ -z "$PKG_NAME" ]; then
                PKG_NAME="$dir"
              fi
              
              PACKAGES_JSON=$(echo "$PACKAGES_JSON" | jq -c \
                --arg name "$PKG_NAME" \
                --arg version "$PKG_VERSION" \
                --arg dir "$dir" \
                --arg title "$PKG_TITLE" \
                '. + [{"name": $name, "version": $version, "dir": $dir, "title": $title}]')
              
              if [ -z "$PKG_TITLE" ]; then
                PACKAGE_LIST="$PKG_NAME"
              else
                PACKAGE_LIST="$PKG_TITLE"
              fi
              
              echo "Found package: $PKG_NAME (version: $PKG_VERSION) in $dir"
            else
              echo "Warning: $dir is not a valid package directory"
            fi
          done
          
          {
            echo "packages<<EOF"
            echo "$PACKAGES_JSON"
            echo "EOF"
            echo "package-list=$PACKAGE_LIST"
          } >> $GITHUB_OUTPUT
          
          echo "Found packages: $PACKAGE_LIST"
          echo "JSON output: $PACKAGES_JSON"

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    needs: [get-version, scan-packages]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.scan-packages.outputs.packages).*.name }}
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a9
          - mips_24kc
          - mipsel_24kc
          - riscv64_riscv64
          - x86_64
        sdk:
          - openwrt-24.10
          # 第一处修改：如果您不需要SNAPSHOT版本，可以删除下面这行
          # - SNAPSHOT

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packages
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          # 第二处修改：ARCH变量的定义
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ needs.scan-packages.outputs.package-list }}
          NO_REFRESH_CHECK: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # 第三处修改：修改artifact名称
          name: ${{ matrix.pkg }}-${{ matrix.arch }}-${{ matrix.sdk }}
          # 第四处修改：修改上传路径
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk
        if: success()

      - name: Create release archive
        # 第五处修改：创建压缩包
        run: |
          # 创建以架构和SDK命名的压缩包
          tar -zcvf ${{ matrix.pkg }}-${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz \
            -C bin/packages/${{ matrix.arch }}/ \
            packages_ci/*.ipk packages_ci/*.apk
        if: success()

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ needs.get-version.outputs.version }}
          PACKAGE_LIST: ${{ needs.scan-packages.outputs.package-list }}
        run: |
          cat > release-notes.md << 'EOF'
          # 🚀 OpenWRT Packages ${{ needs.get-version.outputs.version }}

          - [ OPENWRT 24.10 ] 是IPK格式的软件包。
          - [ SNAPSHOT ] 是APK格式的软件包。

          ## 📦 软件包概览
          EOF
          echo "" >> release-notes.md
          echo "| 软件包 | 版本 | 描述 |" >> release-notes.md
          echo "|---------|---------|-------------|" >> release-notes.md
          
          PACKAGES_JSON='${{ needs.scan-packages.outputs.packages }}'
          echo "$PACKAGES_JSON" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')
            PKG_TITLE=$(echo "$pkg" | jq -r '.title')
            echo "| \`$PKG_NAME\` | \`${PKG_VERSION:-$VERSION}\` | $PKG_TITLE |" >> release-notes.md
          done
          
          echo "" >> release-notes.md
          echo "## 🏗️ 支持的架构" >> release-notes.md
          echo "" >> release-notes.md
          echo "本次发布包含以下架构的软件包：" >> release-notes.md
          echo "" >> release-notes.md
          echo '```' >> release-notes.md
          echo "aarch64_cortex-a53    # ARMv8 64-bit (Cortex-A53)" >> release-notes.md
          echo "aarch64_cortex-a72    # ARMv8 64-bit (Cortex-A72)" >> release-notes.md
          echo "aarch64_cortex-a76    # ARMv8 64-bit (Cortex-A76)" >> release-notes.md
          echo "aarch64_generic       # ARMv8 64-bit (Generic)" >> release-notes.md
          echo "arm_cortex-a7         # ARMv7 32-bit (Cortex-A7)" >> release-notes.md
          echo "arm_cortex-a9         # ARMv7 32-bit (Cortex-A9)" >> release-notes.md
          echo "mips_24kc             # MIPS 32-bit (24Kc)" >> release-notes.md
          echo "mipsel_24kc           # MIPSEL 32-bit (24Kc)" >> release-notes.md
          echo "riscv64_riscv64       # RISC-V 64-bit" >> release-notes.md
          echo "x86_64                # x86-64 64-bit" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## 📋 更新日志" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 本次发布的变更：" >> release-notes.md
          echo "" >> release-notes.md

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "自 $PREV_TAG 以来的变更：" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD | grep -v "Merge" >> release-notes.md
          else
            git log --pretty=format:"- %s (%h)" -10 >> release-notes.md
          fi
          echo "" >> release-notes.md
          echo "" >> release-notes.md

          echo "## ⚠️ 注意事项" >> release-notes.md
          echo "" >> release-notes.md
          echo "- 请根据您的路由器架构选择正确的软件包" >> release-notes.md
          echo "- 如果您使用的是开发版固件，请使用 SNAPSHOT 版本的软件包" >> release-notes.md
          echo "- 如有问题或功能需求，请在 GitHub 上提交 Issue" >> release-notes.md
          echo "" >> release-notes.md

          echo "## 🙏 鸣谢" >> release-notes.md
          echo "" >> release-notes.md
          echo "- [jeessy2](https://github.com/jeessy2/ddns-go) - ddns-go 原项目" >> release-notes.md
          echo "- [sirpdboy](https://github.com/sirpdboy) - OpenWRT 软件包维护者" >> release-notes.md
          echo "" >> release-notes.md

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "=== 生成的发布说明 ==="
          cat release-notes.md
        if: success()

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          name: OpenWRT Packages ${{ needs.get-version.outputs.version }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "${{ matrix.pkg }}-${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz"
          body: ${{ steps.release_notes.outputs.notes }}
        if: success()
